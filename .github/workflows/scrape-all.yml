name: Scrape all free-stuff sources

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      INGEST_API_BASE: https://your-api-domain.example.org
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      # Optional URLs for configurable sites
      FREECYCLE_URL: https://example-freecycle.org/group/lawton/listings
      SAMPLES_DIR_URL: https://moneypantry.com/websites-to-get-free-stuff/
      START_URL: https://lawton.craigslist.org/d/free-stuff/search/zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dateutil

      - name: Scrape Craigslist free stuff
        run: |
          SITE=craigslist_free \
          INGEST_API_BASE="$INGEST_API_BASE" \
          INGEST_TOKEN="$INGEST_TOKEN" \
          python scrapers/scrape_sites.py

      - name: Scrape Craigslist robot vacuums
        run: |
          SITE=craigslist_robot \
          INGEST_API_BASE="$INGEST_API_BASE" \
          INGEST_TOKEN="$INGEST_TOKEN" \
          python scrapers/scrape_sites.py

      - name: Scrape Freecycle-like board
        run: |
          SITE=freecycle_like \
          SOURCE_URL="$FREECYCLE_URL" \
          INGEST_API_BASE="$INGEST_API_BASE" \
          INGEST_TOKEN="$INGEST_TOKEN" \
          python scrapers/scrape_sites.py

      - name: Scrape samples/freebie directory
        run: |
          SITE=samples_directory \
          SOURCE_URL="$SAMPLES_DIR_URL" \
          INGEST_API_BASE="$INGEST_API_BASE" \
          INGEST_TOKEN="$INGEST_TOKEN" \
          python scrapers/scrape_sites.py

      - name: Scrape electronics beta-testing offers
        run: |
          SOURCE_URL="$SAMPLES_DIR_URL" \
          INGEST_API_BASE="$INGEST_API_BASE" \
          INGEST_TOKEN="$INGEST_TOKEN" \
          python scrapers/scrape_beta_electronics.py

      - name: Crawl for generic free household/electronics
        run: |
          START_URL="$START_URL" \
          MAX_DEPTH=1 \
          MAX_PAGES=10 \
          INGEST_API_BASE="$INGEST_API_BASE" \
          INGEST_TOKEN="$INGEST_TOKEN" \
          python scrapers/crawl_free_items.py
