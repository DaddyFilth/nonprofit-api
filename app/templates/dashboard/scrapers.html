{% extends "dashboard/base.html" %}
{% block header %}Scraper Management{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-lg shadow-lg">
    <h4 class="text-xl font-bold mb-4 text-gray-700">Available Scrapers</h4>
    <div class="overflow-x-auto">
        <table class="min-w-full leading-normal">
            <thead>
                <tr>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Scraper Name</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Status</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Interval</th>
                </tr>
            </thead>
            <tbody>
                {% for scraper in scrapers %}
                <tr>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <p class="text-gray-900 whitespace-no-wrap">{{ scraper.name }}</p>
                    </td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <span class="relative inline-block px-3 py-1 font-semibold text-green-900 leading-tight">
                            <span aria-hidden="" class="absolute inset-0 bg-green-200 opacity-50 rounded-full"></span>
                            <span class="relative">Healthy</span>
                        </span>
                    </td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <p class="text-gray-900 whitespace-no-wrap">{{ scraper.interval }}</p>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="mt-8">
        <h4 class="text-xl font-bold mb-2 text-gray-700">Recent Logs</h4>
        <pre class="bg-gray-900 text-green-400 p-4 rounded text-sm overflow-x-auto max-h-64">
{{ logs }}
        </pre>
    </div>
</div>
{% endblock %}
